<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In / Sign Up - CareerHub</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #252525 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo {
            position: fixed;
            top: 1.5rem;
            left: 5%;
            font-size: 2rem;
            font-weight: bold;
            color: #0066ff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        .auth-container {
            width: 100%;
            max-width: 450px;
            padding: 2rem 5%;
        }

        .auth-form {
            background: #252525;
            padding: 2.5rem;
            border-radius: 8px;
            border: 1px solid #333;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .auth-header p {
            color: #aaa;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #333;
            border-radius: 4px;
            background: #1a1a1a;
            color: white;
            font-size: 1rem;
            font-family: inherit;
        }

        .form-group input::placeholder {
            color: #777;
        }

        .form-group input:focus {
            outline: none;
            border-color: #0066ff;
            box-shadow: 0 0 5px rgba(0, 102, 255, 0.2);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #aaa;
            font-size: 0.9rem;
        }

        .checkbox-group input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #0066ff;
        }

        .checkbox-group label {
            cursor: pointer;
            margin: 0;
        }

        .form-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .btn-primary {
            flex: 1;
            background: #0066ff;
            color: white;
            border: none;
            padding: 0.8rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: background 0.3s;
        }

        .btn-primary:hover {
            background: #0052cc;
        }

        .forgot-password {
            text-align: right;
            margin-top: 1rem;
        }

        .forgot-password a {
            color: #0066ff;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .forgot-password a:hover {
            color: #0052cc;
        }

        .divider {
            text-align: center;
            margin: 1.5rem 0;
            color: #777;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 1px;
            background: #333;
        }

        .divider span {
            background: #252525;
            padding: 0 0.5rem;
            position: relative;
            z-index: 1;
        }

        .social-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .btn-social {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #fff;
            padding: 0.8rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-social:hover {
            border-color: #0066ff;
            background: rgba(0, 102, 255, 0.1);
        }

        .toggle-form {
            text-align: center;
            margin-top: 1.5rem;
            color: #aaa;
        }

        .toggle-form a {
            color: #0066ff;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.3s;
        }

        .toggle-form a:hover {
            color: #0052cc;
        }

        .hidden {
            display: none !important;
        }

        .success-message {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid #10b981;
            color: #10b981;
            padding: 1rem;
            border-radius: 4px;
            margin-bottom: 1.5rem;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        @media (max-width: 768px) {
            .auth-container {
                padding: 1rem 5%;
            }

            .social-buttons {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <a href="index.html" class="logo">
        <i class="fas fa-briefcase"></i>
        CareerHub
    </a>

    <div class="auth-container">
        <!-- SIGN IN FORM -->
        <div class="auth-form" id="signInForm">
            <div class="auth-header">
                <h1>Welcome Back</h1>
                <p>Sign in to your CareerHub account</p>
            </div>

            <div class="success-message" id="signInSuccess">
                <i class="fas fa-check-circle"></i> Sign in successful! Redirecting...
            </div>

            <form onsubmit="handleSignIn(event)">
                <div class="social-buttons">
                    <button type="button" class="btn-social">
                        <i class="fab fa-google"></i> Google
                    </button>
                    <button type="button" class="btn-social">
                        <i class="fab fa-github"></i> GitHub
                    </button>
                </div>

                <div class="divider"><span>or</span></div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="signinEmail" placeholder="your@email.com" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••" required>
                </div>

                <div class="form-group">
                    <div class="checkbox-group">
                        <input type="checkbox" id="rememberMe">
                        <label for="rememberMe">Remember me</label>
                    </div>
                </div>

                <button type="submit" class="btn-primary" style="width: 100%;">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>

            <div class="forgot-password">
                <a href="#">Forgot password?</a>
            </div>

            <div class="toggle-form">
                Don't have an account? <a onclick="toggleForms()">Create one</a>
            </div>
        </div>

        <!-- SIGN UP FORM -->
        <div class="auth-form hidden" id="signUpForm">
            <div class="auth-header">
                <h1>Create Account</h1>
                <p>Join CareerHub to find your perfect job</p>
            </div>

            <div class="success-message" id="signUpSuccess">
                <i class="fas fa-check-circle"></i> Account created! Redirecting...
            </div>

            <form onsubmit="handleSignUp(event)">
                <div class="social-buttons">
                    <button type="button" class="btn-social">
                        <i class="fab fa-google"></i> Google
                    </button>
                    <button type="button" class="btn-social">
                        <i class="fab fa-github"></i> GitHub
                    </button>
                </div>

                <div class="divider"><span>or</span></div>

                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="signupName" placeholder="John Doe" required>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="signupEmail" placeholder="your@email.com" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••" required>
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" placeholder="••••••••" required>
                </div>

                <div class="form-group">
                    <div class="checkbox-group">
                        <input type="checkbox" id="agreeTerms" required>
                        <label for="agreeTerms">I agree to the Terms and Conditions</label>
                    </div>
                </div>

                <button type="submit" class="btn-primary" style="width: 100%;">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>

            <div class="toggle-form">
                Already have an account? <a onclick="toggleForms()">Sign in</a>
            </div>
        </div>
    </div>

    <script>
        function toggleForms() {
            document.getElementById('signInForm').classList.toggle('hidden');
            document.getElementById('signUpForm').classList.toggle('hidden');
        }

        function handleSignIn(e) {
            e.preventDefault();
            const email = document.getElementById('signinEmail').value.trim();
            localStorage.setItem('careerHubUser', JSON.stringify({
                name: email,
                email: email
            }));
            const success = document.getElementById('signInSuccess');
            success.classList.add('show');

            setTimeout(() => {
                window.location.href = 'index.html';
            }, 900);
        }

        function handleSignUp(e) {
            e.preventDefault();
            const name = document.getElementById('signupName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            localStorage.setItem('careerHubUser', JSON.stringify({
                name: name || email,
                email: email
            }));
            const success = document.getElementById('signUpSuccess');
            success.classList.add('show');

            setTimeout(() => {
                window.location.href = 'index.html';
            }, 900);
        }

        // Check URL parameter for form type
        const params = new URLSearchParams(window.location.search);
        if (params.get('mode') === 'signup') {
            toggleForms();
        }
    </script>
</body>
</html>
