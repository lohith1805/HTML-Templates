<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In / Sign Up - CareerHub</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #252525 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo {
            position: fixed;
            top: 1.5rem;
            left: 5%;
            font-size: 2rem;
            font-weight: bold;
            color: #0066ff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        .auth-container {
            width: 100%;
            max-width: 450px;
            padding: 2rem 5%;
        }

        .auth-form {
            background: #252525;
            padding: 2.5rem;
            border-radius: 8px;
            border: 1px solid #333;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .auth-header p {
            color: #aaa;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #333;
            border-radius: 4px;
            background: #1a1a1a;
            color: white;
            font-size: 1rem;
            font-family: inherit;
        }

        .form-group input::placeholder {
            color: #777;
        }

        .form-group input:focus {
            outline: none;
            border-color: #0066ff;
            box-shadow: 0 0 5px rgba(0, 102, 255, 0.2);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #aaa;
            font-size: 0.9rem;
        }

        .checkbox-group input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #0066ff;
        }

        .checkbox-group label {
            cursor: pointer;
            margin: 0;
        }

        .form-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .btn-primary {
            flex: 1;
            background: #0066ff;
            color: white;
            border: none;
            padding: 0.8rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: background 0.3s;
        }

        .btn-primary:hover {
            background: #0052cc;
        }

        .forgot-password {
            text-align: right;
            margin-top: 1rem;
        }

        .forgot-password a {
            color: #0066ff;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .forgot-password a:hover {
            color: #0052cc;
        }

        .divider {
            text-align: center;
            margin: 1.5rem 0;
            color: #777;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 1px;
            background: #333;
        }

        .divider span {
            background: #252525;
            padding: 0 0.5rem;
            position: relative;
            z-index: 1;
        }

        .social-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .btn-social {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #fff;
            padding: 0.8rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-social:hover {
            border-color: #0066ff;
            background: rgba(0, 102, 255, 0.1);
        }

        .toggle-form {
            text-align: center;
            margin-top: 1.5rem;
            color: #aaa;
        }

        .toggle-form a {
            color: #0066ff;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.3s;
        }

        .toggle-form a:hover {
            color: #0052cc;
        }

        .hidden {
            display: none !important;
        }

        .success-message {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid #10b981;
            color: #10b981;
            padding: 1rem;
            border-radius: 4px;
            margin-bottom: 1.5rem;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        @media (max-width: 768px) {
            .auth-container {
                padding: 1rem 5%;
            }

            .social-buttons {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <a href="index.html" class="logo">
        <i class="fas fa-briefcase"></i>
        CareerHub
    </a>

    <div class="auth-container">
        <!-- SIGN IN FORM -->
        <div class="auth-form" id="signInForm">
            <div class="auth-header">
                <h1>Welcome Back</h1>
                <p>Sign in to your CareerHub account</p>
            </div>

            <div class="success-message" id="signInSuccess">
                <i class="fas fa-check-circle"></i> Sign in successful! Redirecting...
            </div>

            <form onsubmit="handleSignIn(event)">
                <div class="social-buttons">
                    <button type="button" class="btn-social">
                        <i class="fab fa-google"></i> Google
                    </button>
                    <button type="button" class="btn-social">
                        <i class="fab fa-github"></i> GitHub
                    </button>
                </div>

                <div class="divider"><span>or</span></div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="your@email.com" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••" required>
                </div>

                <div class="form-group">
                    <div class="checkbox-group">
                        <input type="checkbox" id="rememberMe">
                        <label for="rememberMe">Remember me</label>
                    </div>
                </div>

                <button type="submit" class="btn-primary" style="width: 100%;">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>

            <div class="forgot-password">
                <a href="#">Forgot password?</a>
            </div>

            <div class="toggle-form">
                Don't have an account? <a onclick="toggleForms()">Create one</a>
            </div>
        </div>

        <!-- SIGN UP FORM -->
        <div class="auth-form hidden" id="signUpForm">
            <div class="auth-header">
                <h1>Create Account</h1>
                <p>Join CareerHub to find your perfect job</p>
            </div>

            <div class="success-message" id="signUpSuccess">
                <i class="fas fa-check-circle"></i> Account created! Redirecting...
            </div>

            <form onsubmit="handleSignUp(event)">
                <div class="social-buttons">
                    <button type="button" class="btn-social">
                        <i class="fab fa-google"></i> Google
                    </button>
                    <button type="button" class="btn-social">
                        <i class="fab fa-github"></i> GitHub
                    </button>
                </div>

                <div class="divider"><span>or</span></div>

                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="John Doe" required>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="your@email.com" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••" required>
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" placeholder="••••••••" required>
                </div>

                <div class="form-group">
                    <div class="checkbox-group">
                        <input type="checkbox" id="agreeTerms" required>
                        <label for="agreeTerms">I agree to the Terms and Conditions</label>
                    </div>
                </div>

                <button type="submit" class="btn-primary" style="width: 100%;">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>

            <div class="toggle-form">
                Already have an account? <a onclick="toggleForms()">Sign in</a>
            </div>
        </div>
    </div>

    <script>
        function toggleForms() {
            document.getElementById('signInForm').classList.toggle('hidden');
            document.getElementById('signUpForm').classList.toggle('hidden');
        }

        function handleSignIn(e) {
            e.preventDefault();
            const success = document.getElementById('signInSuccess');
            success.classList.add('show');

            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1500);
        }

        function handleSignUp(e) {
            e.preventDefault();
            const success = document.getElementById('signUpSuccess');
            success.classList.add('show');

            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1500);
        }

        // Check URL parameter for form type
        const params = new URLSearchParams(window.location.search);
        if (params.get('mode') === 'signup') {
            toggleForms();
        }
    </script>

<!-- Template Auth Popup Start -->
<style>
  .template-auth-modal,
  .template-auth-modal * {
    box-sizing: border-box;
  }
  .template-auth-modal {
    position: fixed;
    inset: 0;
    z-index: 99999;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background: rgba(0, 0, 0, 0.62);
    backdrop-filter: blur(6px);
  }
  .template-auth-modal.show {
    display: flex;
  }
  .template-auth-card {
    width: min(440px, 94vw);
    border-radius: 22px;
    padding: 24px;
    position: relative;
    background: #ffffff;
    color: #141414;
    box-shadow: 0 24px 70px rgba(0, 0, 0, 0.25);
    animation: templateAuthPop 0.35s ease both;
  }
  @keyframes templateAuthPop {
    from { opacity: 0; transform: translateY(22px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .template-auth-close {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 34px;
    height: 34px;
    border: 0;
    border-radius: 50%;
    background: #f1f1f1;
    color: #111;
    font-size: 20px;
    line-height: 1;
    cursor: pointer;
  }
  .template-auth-title {
    margin: 0 42px 6px 0;
    font-size: 1.45rem;
    line-height: 1.2;
    font-weight: 800;
  }
  .template-auth-subtitle {
    margin: 0 0 18px;
    font-size: 0.94rem;
    line-height: 1.5;
    color: #666;
  }
  .template-auth-tabs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    padding: 5px;
    margin-bottom: 16px;
    border-radius: 999px;
    background: #f3f4f6;
  }
  .template-auth-tab {
    border: 0;
    border-radius: 999px;
    padding: 10px 12px;
    background: transparent;
    color: #555;
    font-weight: 700;
    cursor: pointer;
  }
  .template-auth-tab.active {
    background: #111827;
    color: #fff;
  }
  .template-auth-form {
    display: grid;
    gap: 12px;
  }
  .template-auth-form label {
    display: grid;
    gap: 6px;
    font-size: 0.86rem;
    font-weight: 700;
    color: #333;
  }
  .template-auth-form input {
    width: 100%;
    border: 1px solid #d7d7d7;
    border-radius: 12px;
    padding: 12px 13px;
    font-size: 0.95rem;
    color: #111;
    background: #fff;
    outline: none;
  }
  .template-auth-form input:focus {
    border-color: #111827;
    box-shadow: 0 0 0 3px rgba(17, 24, 39, 0.12);
  }
  .template-auth-submit {
    margin-top: 6px;
    border: 0;
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 0.98rem;
    font-weight: 800;
    background: #111827;
    color: #fff;
    cursor: pointer;
  }
  .template-auth-note {
    margin: 10px 0 0;
    color: #777;
    font-size: 0.78rem;
    line-height: 1.4;
  }
  .template-user-profile {
    display: inline-flex !important;
    align-items: center;
    gap: 8px;
    margin-left: 14px;
    padding: 7px 11px;
    border-radius: 999px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(127,127,127,0.25);
    color: inherit;
    text-decoration: none;
    font-weight: 700;
    font-size: 0.92rem;
    white-space: nowrap;
  }
  .template-user-avatar {
    width: 28px;
    height: 28px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    background: #111827;
    color: #fff;
    font-size: 15px;
    flex: 0 0 auto;
  }
  .template-user-profile.floating {
    position: fixed;
    top: 14px;
    right: 18px;
    z-index: 9999;
    background: #111827;
    color: #fff;
    box-shadow: 0 10px 28px rgba(0,0,0,0.22);
  }
  .template-user-profile.floating .template-user-avatar {
    background: rgba(255,255,255,0.16);
  }
  @media (max-width: 640px) {
    .template-auth-card { padding: 22px 18px; }
    .template-auth-title { font-size: 1.25rem; }
    .template-user-name { display: none; }
    .template-user-profile { padding: 6px; margin-left: 8px; }
  }
</style>
<script>
(function () {
  const pagePath = window.location.pathname;
  const firstFolder = pagePath.split('/').filter(Boolean)[0] || 'template';
  const authKey = 'templateAuthUser_' + firstFolder;
  const dismissedKey = 'templateAuthDismissed_' + firstFolder;

  function getUser() {
    try { return JSON.parse(localStorage.getItem(authKey) || 'null'); }
    catch (e) { return null; }
  }

  function saveUser(user) {
    localStorage.setItem(authKey, JSON.stringify(user));
    sessionStorage.setItem(dismissedKey, 'yes');
  }

  function addProfile(user) {
    if (!user || document.querySelector('.template-user-profile')) return;
    const profile = document.createElement('div');
    profile.className = 'template-user-profile';
    profile.innerHTML = '<span class="template-user-avatar" aria-hidden="true">👤</span><span class="template-user-name"></span>';
    profile.querySelector('.template-user-name').textContent = user.name || 'User';

    const navTargets = [
      document.querySelector('header nav'),
      document.querySelector('.navbar nav'),
      document.querySelector('.nav-links'),
      document.querySelector('.navbar-collapse'),
      document.querySelector('.navbar'),
      document.querySelector('header')
    ].filter(Boolean);

    const target = navTargets[0];
    if (target) {
      target.appendChild(profile);
    } else {
      profile.classList.add('floating');
      document.body.appendChild(profile);
    }
  }

  function showModal() {
    if (document.querySelector('.template-auth-modal')) return;
    const modal = document.createElement('div');
    modal.className = 'template-auth-modal';
    modal.innerHTML = `
      <div class="template-auth-card" role="dialog" aria-modal="true" aria-labelledby="templateAuthTitle">
        <button class="template-auth-close" type="button" aria-label="Close login popup">×</button>
        <h2 class="template-auth-title" id="templateAuthTitle">Welcome back</h2>
        <p class="template-auth-subtitle">Login or register to continue with a personalized profile on this template.</p>
        <div class="template-auth-tabs" role="tablist">
          <button class="template-auth-tab active" type="button" data-auth-mode="login">Login</button>
          <button class="template-auth-tab" type="button" data-auth-mode="register">Register</button>
        </div>
        <form class="template-auth-form">
          <label class="template-name-field">Name
            <input type="text" name="name" placeholder="Your name" autocomplete="name">
          </label>
          <label>Email
            <input type="email" name="email" placeholder="you@example.com" autocomplete="email" required>
          </label>
          <label>Password
            <input type="password" name="password" placeholder="Enter password" autocomplete="current-password" required minlength="4">
          </label>
          <button class="template-auth-submit" type="submit">Login</button>
        </form>
        <p class="template-auth-note">Demo login only. No real account is created.</p>
      </div>`;
    document.body.appendChild(modal);

    const tabs = modal.querySelectorAll('.template-auth-tab');
    const nameField = modal.querySelector('.template-name-field');
    const submit = modal.querySelector('.template-auth-submit');
    let mode = 'login';

    function setMode(nextMode) {
      mode = nextMode;
      tabs.forEach(tab => tab.classList.toggle('active', tab.dataset.authMode === mode));
      nameField.style.display = mode === 'register' ? 'grid' : 'none';
      submit.textContent = mode === 'register' ? 'Create Account' : 'Login';
      modal.querySelector('.template-auth-title').textContent = mode === 'register' ? 'Create your account' : 'Welcome back';
    }

    tabs.forEach(tab => tab.addEventListener('click', () => setMode(tab.dataset.authMode)));
    modal.querySelector('.template-auth-close').addEventListener('click', () => {
      sessionStorage.setItem(dismissedKey, 'yes');
      modal.classList.remove('show');
    });
    modal.addEventListener('click', (event) => {
      if (event.target === modal) {
        sessionStorage.setItem(dismissedKey, 'yes');
        modal.classList.remove('show');
      }
    });
    modal.querySelector('form').addEventListener('submit', (event) => {
      event.preventDefault();
      const formData = new FormData(event.currentTarget);
      const email = String(formData.get('email') || '').trim();
      const fallbackName = email ? email.split('@')[0] : 'User';
      const name = mode === 'register' ? String(formData.get('name') || '').trim() || fallbackName : fallbackName;
      saveUser({ name, email, mode });
      modal.classList.remove('show');
      addProfile({ name, email });
    });

    setMode('login');
    requestAnimationFrame(() => modal.classList.add('show'));
  }

  document.addEventListener('DOMContentLoaded', function () {
    const user = getUser();
    if (user) {
      addProfile(user);
    } else if (!sessionStorage.getItem(dismissedKey)) {
      setTimeout(showModal, 500);
    }
  });
})();
</script>
<!-- Template Auth Popup End -->

</body>
</html>
