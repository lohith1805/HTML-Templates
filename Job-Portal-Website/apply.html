<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply for Job - CareerHub</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a1a;
            color: #fff;
        }

        /* ===== NAVBAR ===== */
        nav {
            background: #1a1a1a;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 2rem;
            font-weight: bold;
            color: #0066ff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            color: #ccc;
            text-decoration: none;
            transition: color 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-links a:hover {
            color: #0066ff;
        }

        .nav-buttons {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .btn-signin, .btn-signup {
            padding: 0.6rem 1.5rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-signin {
            background: transparent;
            color: #0066ff;
            border: 1px solid #0066ff;
        }

        .btn-signin:hover {
            background: #0066ff;
            color: white;
        }

        .btn-signup {
            background: #0066ff;
            color: white;
        }

        .btn-signup:hover {
            background: #0052cc;
        }

        .saved-badge {
            background: #0066ff;
            color: white;
            padding: 0.2rem 0.6rem;
            border-radius: 3px;
            font-size: 0.8rem;
            margin-left: 0.5rem;
        }

        /* ===== FORM CONTAINER ===== */
        .form-container {
            max-width: 700px;
            margin: 3rem auto;
            padding: 0 5%;
        }

        .form-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .form-header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .form-header p {
            color: #aaa;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #333;
            border-radius: 4px;
            background: #252525;
            color: white;
            font-family: inherit;
            font-size: 1rem;
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: #777;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #0066ff;
            box-shadow: 0 0 5px rgba(0, 102, 255, 0.2);
        }

        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        /* ===== FILE UPLOAD ===== */
        .resume-upload {
            border: 2px dashed #0066ff;
            border-radius: 8px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .resume-upload:hover {
            background: rgba(0, 102, 255, 0.1);
        }

        .resume-upload.active {
            background: rgba(0, 102, 255, 0.15);
            border-color: #0052cc;
        }

        .resume-upload i {
            font-size: 2rem;
            color: #0066ff;
            margin-bottom: 0.5rem;
            display: block;
        }

        .resume-upload p {
            color: #aaa;
            font-size: 0.9rem;
        }

        .resume-upload input[type="file"] {
            display: none;
        }

        .file-info {
            background: rgba(0, 102, 255, 0.1);
            border: 1px solid #0066ff;
            padding: 1rem;
            border-radius: 4px;
            color: #0066ff;
            margin-top: 1rem;
            display: none;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .file-info.show {
            display: flex;
        }

        /* ===== FORM BUTTONS ===== */
        .form-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .btn-submit {
            flex: 1;
            background: #0066ff;
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: background 0.3s;
        }

        .btn-submit:hover {
            background: #0052cc;
        }

        .btn-cancel {
            flex: 1;
            background: transparent;
            color: #0066ff;
            border: 1px solid #0066ff;
            padding: 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .btn-cancel:hover {
            background: #0066ff;
            color: white;
        }

        .required {
            color: #ff6b6b;
        }

        .success-message {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid #10b981;
            color: #10b981;
            padding: 1rem;
            border-radius: 4px;
            margin-bottom: 1.5rem;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .form-buttons {
                flex-direction: column;
            }

            nav {
                flex-wrap: wrap;
            }

            .nav-links {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- NAVBAR -->
    <nav>
        <a href="index.html" class="logo">
            <i class="fas fa-briefcase"></i>
            CareerHub
        </a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="jobs.html">Find Jobs</a></li>
            <li>
                <a href="saved-jobs.html">
                    <i class="fas fa-bookmark"></i>
                    Saved Jobs
                    <span class="saved-badge" id="saved-count">0</span>
                </a>
            </li>
        </ul>
        <div class="nav-buttons">
            <button class="btn-signin" onclick="window.location.href='auth.html?mode=signin'">Sign In</button>
            <button class="btn-signup" onclick="window.location.href='auth.html?mode=signup'">Sign Up</button>
        </div>
    </nav>

    <!-- FORM CONTAINER -->
    <div class="form-container">
        <div class="form-header">
            <h1>Apply for Position</h1>
            <p>Submit your application with your resume</p>
        </div>

        <div class="success-message" id="successMessage">
            <i class="fas fa-check-circle"></i> Application submitted successfully! We'll review your profile and get back to you soon.
        </div>

        <form id="applicationForm" onsubmit="submitApplication(event)">
            <div class="form-group">
                <label>Full Name <span class="required">*</span></label>
                <input type="text" name="fullName" placeholder="John Doe" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Email <span class="required">*</span></label>
                    <input type="email" name="email" placeholder="john@example.com" required>
                </div>
                <div class="form-group">
                    <label>Phone <span class="required">*</span></label>
                    <input type="tel" name="phone" placeholder="+91 XXXXXXXXXX" required>
                </div>
            </div>

            <div class="form-group">
                <label>Current Job Title</label>
                <input type="text" name="currentJobTitle" placeholder="e.g., Software Engineer">
            </div>

            <div class="form-group">
                <label>Years of Experience <span class="required">*</span></label>
                <select name="experience" required>
                    <option value="">Select experience level</option>
                    <option value="0-1">0-1 years</option>
                    <option value="1-3">1-3 years</option>
                    <option value="3-5">3-5 years</option>
                    <option value="5-10">5-10 years</option>
                    <option value="10+">10+ years</option>
                </select>
            </div>

            <div class="form-group">
                <label>Current Location</label>
                <input type="text" name="location" placeholder="City, State">
            </div>

            <div class="form-group">
                <label>Why are you interested in this role? <span class="required">*</span></label>
                <textarea name="motivation" placeholder="Tell us why you're interested in this position and how your skills match..." required></textarea>
            </div>

            <div class="form-group">
                <label>Upload Resume (PDF/DOC) <span class="required">*</span></label>
                <div class="resume-upload" id="resumeUpload" onclick="document.getElementById('resumeInput').click()">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p>Click to upload your resume</p>
                    <p style="font-size: 0.85rem; color: #777;">or drag and drop (PDF, DOC, DOCX)</p>
                </div>
                <input type="file" id="resumeInput" name="resume" accept=".pdf,.doc,.docx" required>
                <div class="file-info" id="fileInfo">
                    <i class="fas fa-file-pdf"></i>
                    <span id="fileName"></span>
                </div>
            </div>

            <div class="form-buttons">
                <button type="submit" class="btn-submit">
                    <i class="fas fa-paper-plane"></i> Submit Application
                </button>
                <button type="button" class="btn-cancel" onclick="window.location.href='jobs.html'">
                    Cancel
                </button>
            </div>
        </form>
    </div>

    <script>
        const resumeUpload = document.getElementById('resumeUpload');
        const resumeInput = document.getElementById('resumeInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');

        resumeUpload.addEventListener('dragover', (e) => {
            e.preventDefault();
            resumeUpload.classList.add('active');
        });

        resumeUpload.addEventListener('dragleave', () => {
            resumeUpload.classList.remove('active');
        });

        resumeUpload.addEventListener('drop', (e) => {
            e.preventDefault();
            resumeUpload.classList.remove('active');
            const files = e.dataTransfer.files;
            if (files.length) {
                resumeInput.files = files;
                updateFileInfo();
            }
        });

        resumeInput.addEventListener('change', updateFileInfo);

        function updateFileInfo() {
            if (resumeInput.files.length) {
                const file = resumeInput.files[0];
                fileName.textContent = `✓ ${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB)`;
                fileInfo.classList.add('show');
            } else {
                fileInfo.classList.remove('show');
            }
        }

        function submitApplication(e) {
            e.preventDefault();

            const formData = new FormData(document.getElementById('applicationForm'));
            const data = {
                fullName: formData.get('fullName'),
                email: formData.get('email'),
                phone: formData.get('phone'),
                currentJobTitle: formData.get('currentJobTitle'),
                experience: formData.get('experience'),
                location: formData.get('location'),
                motivation: formData.get('motivation'),
                resume: resumeInput.files[0]?.name,
                submittedAt: new Date().toISOString()
            };

            // Save to localStorage (in a real app, this would go to a server)
            let applications = JSON.parse(localStorage.getItem('applications') || '[]');
            applications.push(data);
            localStorage.setItem('applications', JSON.stringify(applications));

            // Show success message
            const successMessage = document.getElementById('successMessage');
            successMessage.classList.add('show');

            // Reset form
            document.getElementById('applicationForm').reset();
            fileInfo.classList.remove('show');

            // Redirect after 2 seconds
            setTimeout(() => {
                window.location.href = 'jobs.html';
            }, 2000);
        }

        // Update saved count
        function updateSavedCount() {
            const saved = JSON.parse(localStorage.getItem('savedJobs') || '[]');
            document.getElementById('saved-count').textContent = saved.length;
        }

        updateSavedCount();
    </script>

<!-- Template Auth Popup Start -->
<style>
  .template-auth-modal,
  .template-auth-modal * {
    box-sizing: border-box;
  }
  .template-auth-modal {
    position: fixed;
    inset: 0;
    z-index: 99999;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background: rgba(0, 0, 0, 0.62);
    backdrop-filter: blur(6px);
  }
  .template-auth-modal.show {
    display: flex;
  }
  .template-auth-card {
    width: min(440px, 94vw);
    border-radius: 22px;
    padding: 24px;
    position: relative;
    background: #ffffff;
    color: #141414;
    box-shadow: 0 24px 70px rgba(0, 0, 0, 0.25);
    animation: templateAuthPop 0.35s ease both;
  }
  @keyframes templateAuthPop {
    from { opacity: 0; transform: translateY(22px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .template-auth-close {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 34px;
    height: 34px;
    border: 0;
    border-radius: 50%;
    background: #f1f1f1;
    color: #111;
    font-size: 20px;
    line-height: 1;
    cursor: pointer;
  }
  .template-auth-title {
    margin: 0 42px 6px 0;
    font-size: 1.45rem;
    line-height: 1.2;
    font-weight: 800;
  }
  .template-auth-subtitle {
    margin: 0 0 18px;
    font-size: 0.94rem;
    line-height: 1.5;
    color: #666;
  }
  .template-auth-tabs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    padding: 5px;
    margin-bottom: 16px;
    border-radius: 999px;
    background: #f3f4f6;
  }
  .template-auth-tab {
    border: 0;
    border-radius: 999px;
    padding: 10px 12px;
    background: transparent;
    color: #555;
    font-weight: 700;
    cursor: pointer;
  }
  .template-auth-tab.active {
    background: #111827;
    color: #fff;
  }
  .template-auth-form {
    display: grid;
    gap: 12px;
  }
  .template-auth-form label {
    display: grid;
    gap: 6px;
    font-size: 0.86rem;
    font-weight: 700;
    color: #333;
  }
  .template-auth-form input {
    width: 100%;
    border: 1px solid #d7d7d7;
    border-radius: 12px;
    padding: 12px 13px;
    font-size: 0.95rem;
    color: #111;
    background: #fff;
    outline: none;
  }
  .template-auth-form input:focus {
    border-color: #111827;
    box-shadow: 0 0 0 3px rgba(17, 24, 39, 0.12);
  }
  .template-auth-submit {
    margin-top: 6px;
    border: 0;
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 0.98rem;
    font-weight: 800;
    background: #111827;
    color: #fff;
    cursor: pointer;
  }
  .template-auth-note {
    margin: 10px 0 0;
    color: #777;
    font-size: 0.78rem;
    line-height: 1.4;
  }
  .template-user-profile {
    display: inline-flex !important;
    align-items: center;
    gap: 8px;
    margin-left: 14px;
    padding: 7px 11px;
    border-radius: 999px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(127,127,127,0.25);
    color: inherit;
    text-decoration: none;
    font-weight: 700;
    font-size: 0.92rem;
    white-space: nowrap;
  }
  .template-user-avatar {
    width: 28px;
    height: 28px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    background: #111827;
    color: #fff;
    font-size: 15px;
    flex: 0 0 auto;
  }
  .template-user-profile.floating {
    position: fixed;
    top: 14px;
    right: 18px;
    z-index: 9999;
    background: #111827;
    color: #fff;
    box-shadow: 0 10px 28px rgba(0,0,0,0.22);
  }
  .template-user-profile.floating .template-user-avatar {
    background: rgba(255,255,255,0.16);
  }
  @media (max-width: 640px) {
    .template-auth-card { padding: 22px 18px; }
    .template-auth-title { font-size: 1.25rem; }
    .template-user-name { display: none; }
    .template-user-profile { padding: 6px; margin-left: 8px; }
  }
</style>
<script>
(function () {
  const pagePath = window.location.pathname;
  const firstFolder = pagePath.split('/').filter(Boolean)[0] || 'template';
  const authKey = 'templateAuthUser_' + firstFolder;
  const dismissedKey = 'templateAuthDismissed_' + firstFolder;

  function getUser() {
    try { return JSON.parse(localStorage.getItem(authKey) || 'null'); }
    catch (e) { return null; }
  }

  function saveUser(user) {
    localStorage.setItem(authKey, JSON.stringify(user));
    sessionStorage.setItem(dismissedKey, 'yes');
  }

  function addProfile(user) {
    if (!user || document.querySelector('.template-user-profile')) return;
    const profile = document.createElement('div');
    profile.className = 'template-user-profile';
    profile.innerHTML = '<span class="template-user-avatar" aria-hidden="true">👤</span><span class="template-user-name"></span>';
    profile.querySelector('.template-user-name').textContent = user.name || 'User';

    const navTargets = [
      document.querySelector('header nav'),
      document.querySelector('.navbar nav'),
      document.querySelector('.nav-links'),
      document.querySelector('.navbar-collapse'),
      document.querySelector('.navbar'),
      document.querySelector('header')
    ].filter(Boolean);

    const target = navTargets[0];
    if (target) {
      target.appendChild(profile);
    } else {
      profile.classList.add('floating');
      document.body.appendChild(profile);
    }
  }

  function showModal() {
    if (document.querySelector('.template-auth-modal')) return;
    const modal = document.createElement('div');
    modal.className = 'template-auth-modal';
    modal.innerHTML = `
      <div class="template-auth-card" role="dialog" aria-modal="true" aria-labelledby="templateAuthTitle">
        <button class="template-auth-close" type="button" aria-label="Close login popup">×</button>
        <h2 class="template-auth-title" id="templateAuthTitle">Welcome back</h2>
        <p class="template-auth-subtitle">Login or register to continue with a personalized profile on this template.</p>
        <div class="template-auth-tabs" role="tablist">
          <button class="template-auth-tab active" type="button" data-auth-mode="login">Login</button>
          <button class="template-auth-tab" type="button" data-auth-mode="register">Register</button>
        </div>
        <form class="template-auth-form">
          <label class="template-name-field">Name
            <input type="text" name="name" placeholder="Your name" autocomplete="name">
          </label>
          <label>Email
            <input type="email" name="email" placeholder="you@example.com" autocomplete="email" required>
          </label>
          <label>Password
            <input type="password" name="password" placeholder="Enter password" autocomplete="current-password" required minlength="4">
          </label>
          <button class="template-auth-submit" type="submit">Login</button>
        </form>
        <p class="template-auth-note">Demo login only. No real account is created.</p>
      </div>`;
    document.body.appendChild(modal);

    const tabs = modal.querySelectorAll('.template-auth-tab');
    const nameField = modal.querySelector('.template-name-field');
    const submit = modal.querySelector('.template-auth-submit');
    let mode = 'login';

    function setMode(nextMode) {
      mode = nextMode;
      tabs.forEach(tab => tab.classList.toggle('active', tab.dataset.authMode === mode));
      nameField.style.display = mode === 'register' ? 'grid' : 'none';
      submit.textContent = mode === 'register' ? 'Create Account' : 'Login';
      modal.querySelector('.template-auth-title').textContent = mode === 'register' ? 'Create your account' : 'Welcome back';
    }

    tabs.forEach(tab => tab.addEventListener('click', () => setMode(tab.dataset.authMode)));
    modal.querySelector('.template-auth-close').addEventListener('click', () => {
      sessionStorage.setItem(dismissedKey, 'yes');
      modal.classList.remove('show');
    });
    modal.addEventListener('click', (event) => {
      if (event.target === modal) {
        sessionStorage.setItem(dismissedKey, 'yes');
        modal.classList.remove('show');
      }
    });
    modal.querySelector('form').addEventListener('submit', (event) => {
      event.preventDefault();
      const formData = new FormData(event.currentTarget);
      const email = String(formData.get('email') || '').trim();
      const fallbackName = email ? email.split('@')[0] : 'User';
      const name = mode === 'register' ? String(formData.get('name') || '').trim() || fallbackName : fallbackName;
      saveUser({ name, email, mode });
      modal.classList.remove('show');
      addProfile({ name, email });
    });

    setMode('login');
    requestAnimationFrame(() => modal.classList.add('show'));
  }

  document.addEventListener('DOMContentLoaded', function () {
    const user = getUser();
    if (user) {
      addProfile(user);
    } else if (!sessionStorage.getItem(dismissedKey)) {
      setTimeout(showModal, 500);
    }
  });
})();
</script>
<!-- Template Auth Popup End -->

</body>
</html>
