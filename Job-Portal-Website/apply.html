<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply for Job - CareerHub</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a1a;
            color: #fff;
        }

        /* ===== NAVBAR ===== */
        nav {
            background: #1a1a1a;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 2rem;
            font-weight: bold;
            color: #0066ff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            color: #ccc;
            text-decoration: none;
            transition: color 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-links a:hover {
            color: #0066ff;
        }

        .nav-buttons {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .btn-signin, .btn-signup {
            padding: 0.6rem 1.5rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-signin {
            background: transparent;
            color: #0066ff;
            border: 1px solid #0066ff;
        }

        .btn-signin:hover {
            background: #0066ff;
            color: white;
        }

        .btn-signup {
            background: #0066ff;
            color: white;
        }

        .btn-signup:hover {
            background: #0052cc;
        }

        .saved-badge {
            background: #0066ff;
            color: white;
            padding: 0.2rem 0.6rem;
            border-radius: 3px;
            font-size: 0.8rem;
            margin-left: 0.5rem;
        }

        /* ===== FORM CONTAINER ===== */
        .form-container {
            max-width: 700px;
            margin: 3rem auto;
            padding: 0 5%;
        }

        .form-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .form-header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .form-header p {
            color: #aaa;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #333;
            border-radius: 4px;
            background: #252525;
            color: white;
            font-family: inherit;
            font-size: 1rem;
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: #777;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #0066ff;
            box-shadow: 0 0 5px rgba(0, 102, 255, 0.2);
        }

        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        /* ===== FILE UPLOAD ===== */
        .resume-upload {
            border: 2px dashed #0066ff;
            border-radius: 8px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .resume-upload:hover {
            background: rgba(0, 102, 255, 0.1);
        }

        .resume-upload.active {
            background: rgba(0, 102, 255, 0.15);
            border-color: #0052cc;
        }

        .resume-upload i {
            font-size: 2rem;
            color: #0066ff;
            margin-bottom: 0.5rem;
            display: block;
        }

        .resume-upload p {
            color: #aaa;
            font-size: 0.9rem;
        }

        .resume-upload input[type="file"] {
            display: none;
        }

        .file-info {
            background: rgba(0, 102, 255, 0.1);
            border: 1px solid #0066ff;
            padding: 1rem;
            border-radius: 4px;
            color: #0066ff;
            margin-top: 1rem;
            display: none;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .file-info.show {
            display: flex;
        }

        /* ===== FORM BUTTONS ===== */
        .form-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .btn-submit {
            flex: 1;
            background: #0066ff;
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: background 0.3s;
        }

        .btn-submit:hover {
            background: #0052cc;
        }

        .btn-cancel {
            flex: 1;
            background: transparent;
            color: #0066ff;
            border: 1px solid #0066ff;
            padding: 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .btn-cancel:hover {
            background: #0066ff;
            color: white;
        }

        .required {
            color: #ff6b6b;
        }

        .success-message {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid #10b981;
            color: #10b981;
            padding: 1rem;
            border-radius: 4px;
            margin-bottom: 1.5rem;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .form-buttons {
                flex-direction: column;
            }

            nav {
                flex-wrap: wrap;
            }

            .nav-links {
                display: none;
            }
        }
    

        .career-user-profile {
            display: none;
            align-items: center;
            gap: 0.55rem;
            color: #fff;
            font-weight: 700;
            background: rgba(0, 102, 255, 0.13);
            border: 1px solid rgba(0, 102, 255, 0.55);
            border-radius: 999px;
            padding: 0.45rem 0.8rem;
            white-space: nowrap;
        }

        .career-user-profile.show {
            display: flex;
        }

        .career-user-icon {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #0066ff;
            color: #fff;
            font-size: 0.85rem;
        }

        .career-user-name {
            max-width: 180px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

    </style>
</head>
<body>
    <!-- NAVBAR -->
    <nav>
        <a href="index.html" class="logo">
            <i class="fas fa-briefcase"></i>
            CareerHub
        </a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="jobs.html">Find Jobs</a></li>
            <li>
                <a href="saved-jobs.html">
                    <i class="fas fa-bookmark"></i>
                    Saved Jobs
                    <span class="saved-badge" id="saved-count">0</span>
                </a>
            </li>
        </ul>
        <div class="nav-buttons">
            <button class="btn-signin" onclick="window.location.href='auth.html?mode=signin'">Sign In</button>
            <button class="btn-signup" onclick="window.location.href='auth.html?mode=signup'">Sign Up</button>
        </div>
    </nav>

    <!-- FORM CONTAINER -->
    <div class="form-container">
        <div class="form-header">
            <h1>Apply for Position</h1>
            <p>Submit your application with your resume</p>
        </div>

        <div class="success-message" id="successMessage">
            <i class="fas fa-check-circle"></i> Application submitted successfully! We'll review your profile and get back to you soon.
        </div>

        <form id="applicationForm" onsubmit="submitApplication(event)">
            <div class="form-group">
                <label>Full Name <span class="required">*</span></label>
                <input type="text" name="fullName" placeholder="John Doe" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Email <span class="required">*</span></label>
                    <input type="email" name="email" placeholder="john@example.com" required>
                </div>
                <div class="form-group">
                    <label>Phone <span class="required">*</span></label>
                    <input type="tel" name="phone" placeholder="+91 XXXXXXXXXX" required>
                </div>
            </div>

            <div class="form-group">
                <label>Current Job Title</label>
                <input type="text" name="currentJobTitle" placeholder="e.g., Software Engineer">
            </div>

            <div class="form-group">
                <label>Years of Experience <span class="required">*</span></label>
                <select name="experience" required>
                    <option value="">Select experience level</option>
                    <option value="0-1">0-1 years</option>
                    <option value="1-3">1-3 years</option>
                    <option value="3-5">3-5 years</option>
                    <option value="5-10">5-10 years</option>
                    <option value="10+">10+ years</option>
                </select>
            </div>

            <div class="form-group">
                <label>Current Location</label>
                <input type="text" name="location" placeholder="City, State">
            </div>

            <div class="form-group">
                <label>Why are you interested in this role? <span class="required">*</span></label>
                <textarea name="motivation" placeholder="Tell us why you're interested in this position and how your skills match..." required></textarea>
            </div>

            <div class="form-group">
                <label>Upload Resume (PDF/DOC) <span class="required">*</span></label>
                <div class="resume-upload" id="resumeUpload" onclick="document.getElementById('resumeInput').click()">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p>Click to upload your resume</p>
                    <p style="font-size: 0.85rem; color: #777;">or drag and drop (PDF, DOC, DOCX)</p>
                </div>
                <input type="file" id="resumeInput" name="resume" accept=".pdf,.doc,.docx" required>
                <div class="file-info" id="fileInfo">
                    <i class="fas fa-file-pdf"></i>
                    <span id="fileName"></span>
                </div>
            </div>

            <div class="form-buttons">
                <button type="submit" class="btn-submit">
                    <i class="fas fa-paper-plane"></i> Submit Application
                </button>
                <button type="button" class="btn-cancel" onclick="window.location.href='jobs.html'">
                    Cancel
                </button>
            </div>
        </form>
    </div>

    <script>
        const resumeUpload = document.getElementById('resumeUpload');
        const resumeInput = document.getElementById('resumeInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');

        resumeUpload.addEventListener('dragover', (e) => {
            e.preventDefault();
            resumeUpload.classList.add('active');
        });

        resumeUpload.addEventListener('dragleave', () => {
            resumeUpload.classList.remove('active');
        });

        resumeUpload.addEventListener('drop', (e) => {
            e.preventDefault();
            resumeUpload.classList.remove('active');
            const files = e.dataTransfer.files;
            if (files.length) {
                resumeInput.files = files;
                updateFileInfo();
            }
        });

        resumeInput.addEventListener('change', updateFileInfo);

        function updateFileInfo() {
            if (resumeInput.files.length) {
                const file = resumeInput.files[0];
                fileName.textContent = `✓ ${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB)`;
                fileInfo.classList.add('show');
            } else {
                fileInfo.classList.remove('show');
            }
        }

        function submitApplication(e) {
            e.preventDefault();

            const formData = new FormData(document.getElementById('applicationForm'));
            const data = {
                fullName: formData.get('fullName'),
                email: formData.get('email'),
                phone: formData.get('phone'),
                currentJobTitle: formData.get('currentJobTitle'),
                experience: formData.get('experience'),
                location: formData.get('location'),
                motivation: formData.get('motivation'),
                resume: resumeInput.files[0]?.name,
                submittedAt: new Date().toISOString()
            };

            // Save to localStorage (in a real app, this would go to a server)
            let applications = JSON.parse(localStorage.getItem('applications') || '[]');
            applications.push(data);
            localStorage.setItem('applications', JSON.stringify(applications));

            // Show success message
            const successMessage = document.getElementById('successMessage');
            successMessage.classList.add('show');

            // Reset form
            document.getElementById('applicationForm').reset();
            fileInfo.classList.remove('show');

            // Redirect after 2 seconds
            setTimeout(() => {
                window.location.href = 'jobs.html';
            }, 2000);
        }

        // Update saved count
        function updateSavedCount() {
            const saved = JSON.parse(localStorage.getItem('savedJobs') || '[]');
            document.getElementById('saved-count').textContent = saved.length;
        }

        updateSavedCount();


        function renderCareerUser() {
            const navButtons = document.querySelector('.nav-buttons');
            if (!navButtons) return;
            const user = JSON.parse(localStorage.getItem('careerHubUser') || 'null');
            if (!user) return;

            const displayName = user.name || user.email || 'User';
            navButtons.innerHTML = `
                <div class="career-user-profile show">
                    <span class="career-user-icon"><i class="fas fa-user"></i></span>
                    <span class="career-user-name">${displayName}</span>
                </div>
            `;
        }

        renderCareerUser();

    </script>
</body>
</html>
